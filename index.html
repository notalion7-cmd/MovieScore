<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating Predictor</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🎬 电影评分预测器</h1>

            <p class="subtitle">
                输入电影信息并预测其评分！快来试试吧！
            </p>

            <hr>

            <h2>电影类型</h2>

            <div class="genre-grid">

                <select id="genre1">
                    <option value="">类型1</option>
                </select>

                <select id="genre2">
                    <option value="">类型2</option>
                </select>

                <select id="genre3">
                    <option value="">类型3</option>
                </select>

                <select id="genre4">
                    <option value="">类型4</option>
                </select>

                <select id="genre5">
                    <option value="">类型5</option>
                </select>

            </div>

            <hr>

            <h2>导演</h2>

            <input
                type="text"
                id="director"
                placeholder="e.g. Christopher Nolan">

            <hr>

            <h2>演员</h2>

            <div class="actor-grid">

                <input
                    type="text"
                    id="actor1"
                    placeholder="演员1">

                <input
                    type="text"
                    id="actor2"
                    placeholder="演员2">

                <input
                    type="text"
                    id="actor3"
                    placeholder="演员3">

                <input
                    type="text"
                    id="actor4"
                    placeholder="演员4">

                <input
                    type="text"
                    id="actor5"
                    placeholder="演员5">

            </div>

            <button id="predictBtn">
                预测得分
            </button>

            <div id="loading" class="loading hidden">
                计算中...
            </div>

            <div class="result-card">

                <h2>预测结果</h2>

                <div id="score" class="score">
                    --
                </div>

                <div id="stars" class="stars">
                    ☆☆☆☆☆
                </div>

                <p id="description">
                    请将上面的信息填写完整
                </p>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
